<!DOCTYPE html>
<html>
<head>
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Contact Me</h1>
</header>
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="qualifications.html">Qualifications</a></li>
    <li><a href="skills.html">Skills</a></li>
    <li><a href="certifications.html">Certifications</a></li>
    <li><a class="active" href="contact.html">Contact</a></li>
  </ul>
</nav>
<div class="container">
  <div class="card">
    <h2>Contact Form</h2>
    <form id="contactForm" onsubmit="return validateForm()">
      <label>Name</label>
      <input type="text" id="name" placeholder="Enter your name">
      <label>Mobile Number</label>
      <input type="text" id="mobile" placeholder="10-digit mobile number" maxlength="10">
      <label>Email</label>
      <input type="email" id="email" placeholder="example@mail.com">
      <label>Address</label>
      <textarea id="address" rows="3" placeholder="Enter your address"></textarea>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>
<footer>
  © 2026 Dulla Manoj Reddy
</footer>
<script>
function validateForm() {
  var name = document.getElementById("name").value.trim();
  var mobile = document.getElementById("mobile").value.trim();
  var email = document.getElementById("email").value.trim();
  if (name === "") {
    alert("Please enter your Name.");
    return false;
  }
  if (!/^[A-Za-z ]+$/.test(name)) {
    alert("Name should contain alphabets only. Numbers and special characters are not allowed.");
    return false;
  }
  if (mobile === "") {
    alert("Please enter your Mobile Number.");
    return false;
  }
  if (!/^[0-9]{10}$/.test(mobile)) {
    alert("Mobile number must contain exactly 10 digits. No letters or special characters allowed.");
    return false;
  }
  if (email === "") {
    alert("Please enter your Email.");
    return false;
  }
  if (!/^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/.test(email)) {
    alert("Please enter a valid Email address (e.g. example@mail.com).");
    return false;
  }
  alert("Form Submitted Successfully!");
  document.getElementById("contactForm").reset();
  return false;
}
</script>
</body>
</html>
